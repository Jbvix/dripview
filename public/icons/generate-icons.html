<!DOCTYPE html>
<!-- Utility page to generate PNG icons — open in browser and right-click save canvas as PNG -->
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width
  const ctx = canvas.getContext('2d')
  // Background
  ctx.fillStyle = '#0F1117'
  ctx.fillRect(0, 0, s, s)
  // Outer circle (paper)
  ctx.beginPath()
  ctx.arc(s/2, s/2, s*0.42, 0, Math.PI*2)
  ctx.fillStyle = '#F5F0E8'
  ctx.fill()
  // Oil ring 1 - outer amber
  ctx.beginPath()
  ctx.arc(s/2, s/2, s*0.36, 0, Math.PI*2)
  ctx.fillStyle = '#8B5E3C'
  ctx.fill()
  // Oil ring 2 - mid amber
  ctx.beginPath()
  ctx.arc(s/2, s/2, s*0.26, 0, Math.PI*2)
  ctx.fillStyle = '#B8860B'
  ctx.fill()
  // Oil ring 3 - core gold
  ctx.beginPath()
  ctx.arc(s/2, s/2, s*0.15, 0, Math.PI*2)
  ctx.fillStyle = '#D4A017'
  ctx.fill()
  // Center drop
  ctx.beginPath()
  ctx.arc(s/2, s/2, s*0.07, 0, Math.PI*2)
  ctx.fillStyle = '#1A0A00'
  ctx.fill()
  // Text
  ctx.fillStyle = '#D4A017'
  ctx.font = `bold ${s*0.11}px Inter,sans-serif`
  ctx.textAlign = 'center'
  ctx.fillText('DV', s/2, s*0.86)
}
drawIcon(document.getElementById('c192'))
drawIcon(document.getElementById('c512'))
</script>
</body>
</html>
